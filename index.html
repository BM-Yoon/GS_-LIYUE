<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신상품 매출 리포트 — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:#F9F8F6;color:#1E2029;padding:36px 24px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:980px;margin:0 auto}

/* ── 헤더 ── */
.page-hd{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #EFEFEF}
.page-title{font-size:20px;font-weight:700;color:#1E2029;margin-bottom:4px;min-height:29px}
.page-team{font-size:11px;color:#8A8FA3}

/* ── 상태 바 ── */
#status-bar{
  font-size:11px;color:#8A8FA3;margin-bottom:18px;
  display:flex;align-items:center;gap:7px;min-height:18px;
}
#status-bar.ok{color:#0F6E56}
#status-bar.fail{color:#9B2236}
.dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;flex-shrink:0}
.dot.ok{background:#0F6E56}
.dot.fail{background:#9B2236}
.dot.spin{
  background:transparent;border:2px solid #D1D5DB;
  border-top-color:#1E2029;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── KPI 카드 ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
@media(max-width:620px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border:1px solid #EFEFEF;border-radius:10px;padding:18px 20px}
.kpi-lbl{font-size:11px;color:#8A8FA3;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:700;color:#1E2029;min-height:32px}
.kpi-val.purple{color:#534AB7}
.kpi-sub{font-size:10px;color:#8A8FA3;margin-top:4px;min-height:14px}

/* ── 섹션 카드 ── */
.sec-card{background:#fff;border:1px solid #EFEFEF;border-radius:12px;padding:24px 28px;margin-bottom:18px}

/* ── 섹션 헤더 ── */
.sec-hd{margin-bottom:18px}
.sec-hd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-badge{
  background:#F5E6E9;color:#9B2236;font-size:10px;font-weight:700;
  padding:3px 12px;border-radius:20px;letter-spacing:.08em;white-space:nowrap;
}
.sec-title{font-size:14px;font-weight:700;color:#1E2029}
.sec-line{height:.5px;background:#9B2236}

/* ── 공통 테이블 ── */
table{width:100%;border-collapse:collapse}
th{
  font-size:10px;color:#8A8FA3;font-weight:500;text-align:right;
  padding:5px 10px 7px;border-bottom:1px solid #EFEFEF;white-space:nowrap;
}
th.L{text-align:left}
th.C{text-align:center}
td{
  font-size:11.5px;padding:7px 10px;text-align:right;
  color:#1E2029;border-bottom:.5px solid #EFEFEF;
}
td.L{text-align:left}
td.muted{color:#8A8FA3}
tr:last-child td{border-bottom:none}
.row-sub td{color:#8A8FA3;font-size:11px}
.row-sub td.L{text-align:left}
.row-total td{font-weight:700;border-top:1px solid #EFEFEF;border-bottom:none}
.row-total td.L{text-align:left}
.row-hi{background:#FEF7F7}
.hi-st{color:#9B2236;font-weight:700}
.prod-nm{
  font-size:11px;color:#8A8FA3;max-width:210px;
  white-space:normal;word-break:keep-all;line-height:1.5;
}
.tbl-scroll{overflow-x:auto}
.tbl-scroll table{min-width:760px}

/* ── 채널 뱃지 ── */
.b-off {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FAECE7;color:#993C1D}
.b-mall{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56}
.b-smt {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5}

/* ── 날짜별 레이아웃 ── */
.daily-wrap{display:flex;gap:28px;align-items:flex-start}
.daily-chart{flex:1.5}
.daily-tbl{flex:1;padding-top:4px}
@media(max-width:680px){
  .daily-wrap{flex-direction:column}
  .daily-chart,.daily-tbl{flex:none;width:100%}
}
.chart-box{position:relative;width:100%;height:220px}

/* ── 인사이트 박스 ── */
.insight{
  margin-top:16px;padding:10px 14px;
  border-left:3px solid #9B2236;background:#FDFAF9;
  font-size:11px;color:#1E2029;line-height:1.8;
  border-radius:0 6px 6px 0;
}
.insight strong{color:#9B2236}

/* ── 스켈레톤 ── */
.sk{
  display:inline-block;border-radius:3px;
  background:linear-gradient(90deg,#EFEFEF 25%,#F9F8F6 50%,#EFEFEF 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 에러 ── */
.err-box{
  padding:16px 20px;border-radius:8px;
  background:#FFF5F5;border:1px solid #F5C6CB;
  font-size:12px;color:#9B2236;line-height:1.7;
}
.err-box code{
  display:block;margin-top:8px;padding:8px 12px;
  background:#fff;border-radius:4px;font-size:10px;
  color:#555;word-break:break-all;
}

/* ── 구분선 (채널 수량 그룹) ── */
.bl{border-left:1px solid #EFEFEF !important}

/* ── 푸터 ── */
.footer{margin-top:24px;font-size:10px;color:#C8CBD2;text-align:right}
</style>
</head>
<body>
<div class="wrap">

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   ★  URL 설정 (이 두 줄만 수정)
   ──────────────────────────────────────────────────────────────────
   첫 번째 탭(출시상품데이터) → 제공하신 URL 그대로 사용
   두 번째 탭(매출데이터)     → 같은 스프레드시트, gid 만 다름
     구하는 법: 구글 시트에서 '매출데이터' 탭 클릭
               주소창 맨 끝 #gid=XXXXXXX 숫자를 복사
               아래 URL 끝 &gid= 뒤에 붙여넣기
══════════════════════════════════════════════════════════════════ */
const CSV_PRODUCT = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGJp-jXjVymSFfp3yG_HQzt4KVq6gmqHGntzC-jwK5g42cBHhux-6tyifdiAN7ag/pub?output=csv';
const CSV_SALES   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTGJp-jXjVymSFfp3yG_HQzt4KVq6gmqHGntzC-jwK5g42cBHhux-6tyifdiAN7ag/pub?output=csv&gid=';
//                                                                                                                                                                   ↑ 매출데이터 탭의 gid 숫자 입력

/* ══════════════════════════════════════════════════════════════════
   출시상품데이터 컬럼 (구글 시트 헤더와 동일하게 유지)
     테마 | 88코드 | 상품명 | 구분자 | 판매가
     오프라인 OTB | 통합몰 OTB | 스마트스토어 OTB | 총 OTB | 총물량

   매출데이터 컬럼 (구글 시트 헤더와 동일하게 유지)
     날짜 | 판매채널 | 88코드 | 자재내역 | 수량 | 금액
══════════════════════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────────────────────
   유틸
────────────────────────────────────────────────────────────── */
function parseCSV(raw) {
  const lines = raw.trim().split(/\r?\n/);
  const heads = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    return Object.fromEntries(heads.map((h, i) => [h, (cols[i] ?? '').replace(/^"|"$/g, '').trim()]));
  }).filter(r => Object.values(r).some(v => v !== ''));
}

/* 숫자 파싱 */
const toN = v => parseFloat(String(v).replace(/,/g, '')) || 0;
const toI = v => Math.round(toN(v));

/* 포맷 */
const fmtN   = v => Number(v).toLocaleString('ko-KR');
const fmtSt  = v => v > 0 ? v.toFixed(1) + '%' : '0.0%';
const fmtM   = won => {                            // → XX.XX백만
  if (!won || won === 0) return '-';
  return (won / 1_000_000).toFixed(2) + '백만';
};

/* 날짜 → MM/DD */
function toMMDD(raw) {
  if (!raw) return '-';
  const s = String(raw).trim();
  if (/^\d{4,5}$/.test(s)) {              // 엑셀 시리얼
    const d = new Date(1899, 11, 30);
    d.setDate(d.getDate() + parseInt(s));
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[2]}/${iso[3]}`;
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})/);
  if (mdy) return `${String(mdy[1]).padStart(2,'0')}/${String(mdy[2]).padStart(2,'0')}`;
  return s.slice(0, 5);
}

/* 채널명 → 뱃지 클래스 */
function badgeCls(ch) {
  if (!ch) return '';
  const lc = ch.toLowerCase();
  if (lc.includes('오프라인') || lc.includes('offline')) return 'b-off';
  if (lc.includes('통합몰'))                              return 'b-mall';
  if (lc.includes('스마트') || lc.includes('smart'))      return 'b-smt';
  return '';
}

/* ──────────────────────────────────────────────────────────────
   상태 바 헬퍼
────────────────────────────────────────────────────────────── */
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  const dot = bar.querySelector('.dot');
  dot.className = 'dot ' + type;
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

/* ──────────────────────────────────────────────────────────────
   Chart.js
────────────────────────────────────────────────────────────── */
let chartInst = null;
const PALETTE = ['#1E2029','#555A6E','#8A8FA3','#B0B5C1','#D1D5DB'];

function drawChart(labels, values) {
  const ctx = document.getElementById('daily-chart').getContext('2d');
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: labels.map((_, k) => PALETTE[Math.min(k, PALETTE.length-1)]),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtM(c.parsed.y * 1_000_000) } }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: {
            font: { size: 11, family: '"Noto Sans KR",sans-serif' },
            color: '#8A8FA3', maxRotation: 0, autoSkip: false
          }
        },
        y: {
          grid: { color: '#EFEFEF' },
          border: { display: false },
          ticks: { font: { size: 10 }, color: '#8A8FA3', callback: v => v + '백만' }
        }
      },
      layout: { padding: { top: 30 } }
    },
    plugins: [{
      id: 'topLabel',
      afterDatasetsDraw(chart) {
        const { ctx: c, data } = chart;
        chart.getDatasetMeta(0).data.forEach((bar, idx) => {
          const v = data.datasets[0].data[idx];
          if (!v) return;
          c.save();
          c.font      = '600 11px "Noto Sans KR", sans-serif';
          c.fillStyle = '#1E2029';
          c.textAlign = 'center';
          c.fillText(v.toFixed(2) + '백만', bar.x, bar.y - 8);
          c.restore();
        });
      }
    }]
  });
}

/* ──────────────────────────────────────────────────────────────
   ① 출시상품데이터 파싱
   컬럼: 테마 | 88코드 | 상품명 | 구분자 | 판매가
         오프라인 OTB | 통합몰 OTB | 스마트스토어 OTB | 총 OTB | 총물량
────────────────────────────────────────────────────────────── */
function buildProductMap(rows) {
  const map = {};   // key: 88코드(문자열)
  rows.forEach(r => {
    const code = String(r['88코드'] || '').trim();
    if (!code) return;

    const otbOff  = toI(r['오프라인 OTB']     || r['오프라인OTB']     || 0);
    const otbMall = toI(r['통합몰 OTB']        || r['통합몰OTB']       || 0);
    const otbSmt  = toI(r['스마트스토어 OTB']  || r['스마트스토어OTB'] || 0);
    const otbAll  = toI(r['총 OTB'] || r['총  OTB'] || r['총OTB'])
                    || (otbOff + otbMall + otbSmt);

    map[code] = {
      theme:   (r['테마']   || '').trim(),
      name:    (r['상품명'] || '').trim(),
      gubu:    (r['구분자'] || '').trim(),
      otbOff, otbMall, otbSmt, otbAll,
      /* 매출 집계 필드 (매출데이터 처리 후 채워짐) */
      qtyOff: 0, qtyMall: 0, qtySmt: 0,
      salesOff: 0, salesMall: 0, salesSmt: 0,
    };
  });
  return map;
}

/* ──────────────────────────────────────────────────────────────
   ② 매출데이터 파싱 + prodMap 에 채워넣기
   컬럼: 날짜 | 판매채널 | 88코드 | 자재내역 | 수량 | 금액
────────────────────────────────────────────────────────────── */
function processSales(rows, prodMap) {
  const byDate = {};    // { 'MM/DD': { qty, sales } }
  const byCh   = {};    // { '채널명': { qty, sales } }

  rows.forEach(r => {
    /* ── 필드 읽기 (유연하게 다수 컬럼명 시도) ── */
    const dateKey = toMMDD(r['날짜'] || r['일자'] || r['date'] || '');
    const ch      = (r['판매채널'] || r['채널'] || r['세부채널'] || r['channel'] || '').trim();
    const code    = String(r['88코드'] || r['제품코드'] || r['code'] || '').trim();
    const qty     = toI(r['수량'] || r['매출수량'] || r['qty'] || 0);
    const sales   = toN(r['금액'] || r['매출금액'] || r['sales'] || 0);

    if (!dateKey || dateKey === '-') return;

    /* 날짜별 집계 */
    if (!byDate[dateKey]) byDate[dateKey] = { qty: 0, sales: 0 };
    byDate[dateKey].qty   += qty;
    byDate[dateKey].sales += sales;

    /* 채널별 집계 */
    if (ch) {
      if (!byCh[ch]) byCh[ch] = { qty: 0, sales: 0 };
      byCh[ch].qty   += qty;
      byCh[ch].sales += sales;
    }

    /* prodMap 에 채널별 매출 반영 (88코드 기준 매칭) */
    if (prodMap[code]) {
      const lc = ch.toLowerCase();
      if (lc.includes('오프라인') || lc.includes('offline')) {
        prodMap[code].qtyOff   += qty;
        prodMap[code].salesOff += sales;
      } else if (lc.includes('통합몰')) {
        prodMap[code].qtyMall   += qty;
        prodMap[code].salesMall += sales;
      } else if (lc.includes('스마트') || lc.includes('smart')) {
        prodMap[code].qtySmt   += qty;
        prodMap[code].salesSmt += sales;
      } else {
        /* 알 수 없는 채널 → 오프라인으로 처리 */
        prodMap[code].qtyOff   += qty;
        prodMap[code].salesOff += sales;
      }
    }
  });

  return { byDate, byCh };
}

/* ──────────────────────────────────────────────────────────────
   렌더 ① KPI 카드
────────────────────────────────────────────────────────────── */
function renderKPI(prodMap, totalQty, totalSales) {
  const totalOtb = Object.values(prodMap).reduce((a, p) => a + p.otbAll, 0);
  const st = totalOtb > 0 ? totalQty / totalOtb * 100 : 0;

  document.getElementById('v-otb').textContent       = fmtN(totalOtb);
  document.getElementById('v-qty').textContent       = fmtN(totalQty);
  document.getElementById('v-sales').textContent     = fmtM(totalSales);
  document.getElementById('v-sales-raw').textContent = '₩' + fmtN(Math.round(totalSales));
  document.getElementById('v-st').textContent        = fmtSt(st);
  document.getElementById('v-st-sub').textContent    = `${fmtN(totalQty)} / ${fmtN(totalOtb)} EA`;
}

/* ──────────────────────────────────────────────────────────────
   렌더 ② 채널별 요약
────────────────────────────────────────────────────────────── */
function renderChannel(byCh, prodMap) {
  /* OTB 채널 매핑 */
  let otbOff=0, otbMall=0, otbSmt=0;
  Object.values(prodMap).forEach(p => {
    otbOff  += p.otbOff;
    otbMall += p.otbMall;
    otbSmt  += p.otbSmt;
  });

  /* 채널명 정규화 → 3버킷으로 합산 */
  const bucket = {
    '오프라인':     { qty: 0, sales: 0, otb: otbOff  },
    '통합몰':       { qty: 0, sales: 0, otb: otbMall },
    '스마트스토어': { qty: 0, sales: 0, otb: otbSmt  },
  };
  Object.entries(byCh).forEach(([ch, d]) => {
    const lc = ch.toLowerCase();
    let key = '오프라인';
    if (lc.includes('통합몰'))                         key = '통합몰';
    else if (lc.includes('스마트') || lc.includes('smart')) key = '스마트스토어';
    bucket[key].qty   += d.qty;
    bucket[key].sales += d.sales;
  });

  const BADGE = { '오프라인':'b-off', '통합몰':'b-mall', '스마트스토어':'b-smt' };
  let html = '';
  Object.entries(bucket).forEach(([name, b]) => {
    const st = b.otb > 0 ? b.qty / b.otb * 100 : 0;
    html += `<tr>
      <td class="L"><span class="${BADGE[name]}">${name}</span></td>
      <td>${fmtN(b.otb)}</td>
      <td>${fmtN(b.qty)}</td>
      <td>${fmtM(b.sales)}</td>
      <td>${fmtSt(st)}</td>
    </tr>`;
  });

  /* 온라인 합계 */
  const onQty   = bucket['통합몰'].qty   + bucket['스마트스토어'].qty;
  const onSales = bucket['통합몰'].sales + bucket['스마트스토어'].sales;
  const onOtb   = otbMall + otbSmt;
  html += `<tr class="row-sub">
    <td class="L">온라인 합계</td>
    <td>${fmtN(onOtb)}</td>
    <td>${fmtN(onQty)}</td>
    <td>${fmtM(onSales)}</td>
    <td>${fmtSt(onOtb > 0 ? onQty / onOtb * 100 : 0)}</td>
  </tr>`;

  document.getElementById('ch-body').innerHTML = html;
}

/* ──────────────────────────────────────────────────────────────
   렌더 ③ 날짜별 매출 추이
────────────────────────────────────────────────────────────── */
function renderDaily(byDate, totalOtb) {
  const sorted = Object.entries(byDate).sort((a, b) => a[0].localeCompare(b[0]));
  const labels = [], vals = [];
  let totQty = 0, totSales = 0, html = '';

  sorted.forEach(([date, d]) => {
    const st = totalOtb > 0 ? d.qty / totalOtb * 100 : 0;
    totQty   += d.qty;
    totSales += d.sales;
    labels.push(date);
    vals.push(d.sales / 1_000_000);
    html += `<tr>
      <td class="L">${date}</td>
      <td>${fmtN(d.qty)}</td>
      <td>${fmtM(d.sales)}</td>
      <td>${fmtSt(st)}</td>
    </tr>`;
  });

  if (sorted.length > 1) {
    html += `<tr class="row-total">
      <td class="L">합계</td>
      <td>${fmtN(totQty)}</td>
      <td>${fmtM(totSales)}</td>
      <td></td>
    </tr>`;
  }

  document.getElementById('dl-body').innerHTML = html;
  drawChart(labels, vals);

  const box = document.getElementById('dl-insight');
  if (sorted.length > 0 && totSales > 0) {
    const peak = sorted.reduce((m, e) => e[1].sales > m[1].sales ? e : m);
    const pct  = (peak[1].sales / totSales * 100).toFixed(0);
    box.innerHTML = `최고 매출일 <strong>${peak[0]}</strong> — ${fmtM(peak[1].sales)} / 전체 대비 ${pct}% 집중`;
  } else {
    box.textContent = '데이터 누적에 따라 자동 업데이트';
  }
}

/* ──────────────────────────────────────────────────────────────
   렌더 ④ 품목별 매출 테이블
   컬럼: 구분자 | 총OTB | 총매출수량 | 총매출금액 | Sell-thru
         | 오프라인(EA) | 통합몰(EA) | 스마트스토어(EA)
────────────────────────────────────────────────────────────── */
function renderProducts(prodMap) {
  let html = '';
  Object.values(prodMap).forEach(p => {
    const totQty   = p.qtyOff + p.qtyMall + p.qtySmt;
    const totSales = p.salesOff + p.salesMall + p.salesSmt;
    const st       = p.otbAll > 0 ? totQty / p.otbAll * 100 : 0;
    const hi       = st >= 5;

    html += `<tr class="${hi ? 'row-hi' : ''}">
      <td class="L prod-nm">${p.gubu || p.name || '-'}</td>
      <td>${fmtN(p.otbAll)}</td>
      <td>${fmtN(totQty)}</td>
      <td>${fmtM(totSales)}</td>
      <td class="${hi ? 'hi-st' : ''}">${fmtSt(st)}</td>
      <td class="bl">${p.qtyOff  > 0 ? fmtN(p.qtyOff)  : '<span class="muted">-</span>'}</td>
      <td>${p.qtyMall > 0 ? fmtN(p.qtyMall) : '<span class="muted">-</span>'}</td>
      <td>${p.qtySmt  > 0 ? fmtN(p.qtySmt)  : '<span class="muted">-</span>'}</td>
    </tr>`;
  });

  document.getElementById('pr-body').innerHTML = html ||
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">제품 데이터 없음</td></tr>';
}

/* ──────────────────────────────────────────────────────────────
   에러 표시
────────────────────────────────────────────────────────────── */
function showErr(msg, url) {
  setStatus('fail', '데이터 로드 실패');
  const hint = url ? `<code>${url}</code>` : '';
  const box  = `<tr><td colspan="8">
    <div class="err-box">${msg}${hint}</div>
  </td></tr>`;
  ['ch-body','dl-body','pr-body'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = box;
  });
}

/* ──────────────────────────────────────────────────────────────
   메인
────────────────────────────────────────────────────────────── */
async function init() {
  /* 매출데이터 URL의 gid가 비어있으면 경고 */
  if (CSV_SALES.endsWith('&gid=')) {
    showErr(
      '매출데이터 탭의 gid를 입력해주세요.<br>' +
      '구글 시트에서 [매출데이터] 탭 클릭 → 주소창 끝 <b>#gid=숫자</b> 확인 → <b>CSV_SALES</b> 변수 끝에 숫자 붙여넣기',
      CSV_SALES
    );
    document.getElementById('page-title').textContent = '신상품 매출 리포트';
    return;
  }

  setStatus('spin', '데이터 불러오는 중');

  try {
    /* 두 시트 병렬 fetch */
    const [res1, res2] = await Promise.all([
      fetch(CSV_PRODUCT),
      fetch(CSV_SALES),
    ]);
    if (!res1.ok) throw new Error(`출시상품데이터 HTTP ${res1.status}`);
    if (!res2.ok) throw new Error(`매출데이터 HTTP ${res2.status}`);

    const [txt1, txt2] = await Promise.all([res1.text(), res2.text()]);

    /* 파싱 */
    const productRows = parseCSV(txt1);
    const salesRows   = parseCSV(txt2);

    /* 출시상품데이터 → prodMap */
    const prodMap = buildProductMap(productRows);

    /* 타이틀: 첫 번째 제품의 테마 사용 */
    const firstTheme = (Object.values(prodMap)[0] || {}).theme || '';
    if (firstTheme) {
      document.getElementById('page-title').textContent  = firstTheme;
      document.title = firstTheme + ' — Business Management';
      document.getElementById('footer-txt').textContent  = 'Business Management · ' + firstTheme;
    } else {
      document.getElementById('page-title').textContent = '신상품 매출 리포트';
    }

    /* 매출데이터 → 집계 + prodMap 채우기 */
    const { byDate, byCh } = processSales(salesRows, prodMap);

    /* 전체 합산 */
    const totalQty   = Object.values(byDate).reduce((a, d) => a + d.qty,   0);
    const totalSales = Object.values(byDate).reduce((a, d) => a + d.sales, 0);
    const totalOtb   = Object.values(prodMap).reduce((a, p) => a + p.otbAll, 0);

    /* 렌더 */
    renderKPI(prodMap, totalQty, totalSales);
    renderChannel(byCh, prodMap);
    renderDaily(byDate, totalOtb);
    renderProducts(prodMap);

    const now = new Date().toLocaleString('ko-KR',
      { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    setStatus('ok', `마지막 업데이트: ${now}`);

  } catch (err) {
    console.error('[Dashboard]', err);
    showErr('로드 실패 — ' + err.message);
  }
}

init();
</script>
