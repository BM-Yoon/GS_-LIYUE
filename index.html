<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신상품 매출 리포트 — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:#F9F8F6;color:#1E2029;padding:36px 24px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:980px;margin:0 auto}

/* ══ HEADER ══ */
.page-hd{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #EFEFEF}
.page-title{font-size:20px;font-weight:700;color:#1E2029;margin-bottom:4px;min-height:28px}
.page-team{font-size:11px;color:#8A8FA3}

/* ══ STATUS ══ */
#status-bar{font-size:11px;color:#8A8FA3;margin-bottom:18px;display:flex;align-items:center;gap:7px;min-height:18px}
#status-bar.ok{color:#0F6E56}
#status-bar.fail{color:#9B2236}
.dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;flex-shrink:0}
.dot.ok{background:#0F6E56}
.dot.fail{background:#9B2236}
.dot.spin{background:transparent;border:2px solid #D1D5DB;border-top-color:#1E2029;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ KPI ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
@media(max-width:620px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border:1px solid #EFEFEF;border-radius:10px;padding:18px 20px}
.kpi-lbl{font-size:11px;color:#8A8FA3;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:700;color:#1E2029;min-height:32px}
.kpi-val.purple{color:#534AB7}
.kpi-sub{font-size:10px;color:#8A8FA3;margin-top:4px;min-height:14px}

/* ══ SECTION CARD ══ */
.sec-card{background:#fff;border:1px solid #EFEFEF;border-radius:12px;padding:24px 28px;margin-bottom:18px}
.sec-hd{margin-bottom:18px}
.sec-hd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-badge{background:#F5E6E9;color:#9B2236;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.08em;white-space:nowrap}
.sec-title{font-size:14px;font-weight:700;color:#1E2029}
.sec-line{height:.5px;background:#9B2236}

/* ══ TABLE ══ */
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#8A8FA3;font-weight:500;text-align:right;padding:5px 10px 7px;border-bottom:1px solid #EFEFEF;white-space:nowrap}
th.L{text-align:left}
th.C{text-align:center}
td{font-size:11.5px;padding:7px 10px;text-align:right;color:#1E2029;border-bottom:.5px solid #EFEFEF}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
.row-sub td{color:#8A8FA3;font-size:11px}
.row-sub td.L{text-align:left}
.row-total td{font-weight:700;border-top:1px solid #EFEFEF;border-bottom:none}
.row-total td.L{text-align:left}
.row-hi{background:#FEF7F7}
.hi-st{color:#9B2236;font-weight:700}
.prod-nm{font-size:11px;color:#8A8FA3;max-width:210px;white-space:normal;word-break:keep-all;line-height:1.5}
.tbl-scroll{overflow-x:auto}
.tbl-scroll table{min-width:740px}
.bl{border-left:1px solid #EFEFEF !important}
.dash{color:#D1D5DB}

/* ══ BADGES ══ */
.b-off {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FAECE7;color:#993C1D}
.b-mall{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56}
.b-smt {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5}

/* ══ DAILY LAYOUT ══ */
.daily-wrap{display:flex;gap:28px;align-items:flex-start}
.daily-chart{flex:1.5}
.daily-tbl{flex:1;padding-top:4px}
@media(max-width:680px){.daily-wrap{flex-direction:column}.daily-chart,.daily-tbl{flex:none;width:100%}}
.chart-box{position:relative;width:100%;height:220px}

/* ══ INSIGHT ══ */
.insight{margin-top:16px;padding:10px 14px;border-left:3px solid #9B2236;background:#FDFAF9;font-size:11px;color:#1E2029;line-height:1.8;border-radius:0 6px 6px 0}
.insight strong{color:#9B2236}

/* ══ SKELETON ══ */
.sk{display:inline-block;border-radius:3px;background:linear-gradient(90deg,#EFEFEF 25%,#F9F8F6 50%,#EFEFEF 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ══ ERROR ══ */
.err-box{padding:14px 18px;border-radius:8px;background:#FFF5F5;border:1px solid #F5C6CB;font-size:12px;color:#9B2236;line-height:1.8}
.err-box b{font-weight:700}
.err-box pre{margin-top:8px;padding:8px 12px;background:#fff;border-radius:4px;font-size:10px;color:#555;white-space:pre-wrap;word-break:break-all}

/* ══ FOOTER ══ */
.footer{margin-top:24px;font-size:10px;color:#C8CBD2;text-align:right}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-hd">
    <div class="page-title" id="page-title">
      <span class="sk" style="width:240px;height:24px;display:inline-block"></span>
    </div>
    <div class="page-team">Business Management</div>
  </div>

  <div id="status-bar">
    <span class="dot spin"></span>
    <span id="status-msg">데이터 불러오는 중</span>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-lbl">총 물량 (OTB)</div>
      <div class="kpi-val" id="v-otb"><span class="sk" style="width:72px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 수량</div>
      <div class="kpi-val" id="v-qty"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 금액</div>
      <div class="kpi-val" id="v-sales"><span class="sk" style="width:96px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-sales-raw"><span class="sk" style="width:84px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">전체 Sell-thru</div>
      <div class="kpi-val purple" id="v-st"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub" id="v-st-sub"><span class="sk" style="width:104px;height:11px;display:inline-block;margin-top:3px"></span></div>
    </div>
  </div>

  <!-- CHANNEL -->
  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">CHANNEL</span><span class="sec-title">채널별 요약</span></div>
      <div class="sec-line"></div>
    </div>
    <table>
      <thead><tr>
        <th class="L">채널</th>
        <th>OTB (EA)</th><th>매출 수량 (EA)</th><th>매출 금액</th><th>Sell-thru</th>
      </tr></thead>
      <tbody id="ch-body">
        <tr><td colspan="5"><span class="sk" style="width:100%;height:30px;display:block"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:88%;height:30px;display:block;margin-top:3px"></span></td></tr>
        <tr><td colspan="5"><span class="sk" style="width:93%;height:30px;display:block;margin-top:3px"></span></td></tr>
      </tbody>
    </table>
  </div>

  <!-- DAILY -->
  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">DAILY</span><span class="sec-title">날짜별 매출 추이</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="daily-wrap">
      <div class="daily-chart">
        <div class="chart-box">
          <canvas id="daily-chart" aria-label="날짜별 매출 금액 막대 차트"></canvas>
        </div>
      </div>
      <div class="daily-tbl">
        <table>
          <thead><tr>
            <th class="L">날짜</th><th>수량 (EA)</th><th>매출 금액</th><th>Sell-thru</th>
          </tr></thead>
          <tbody id="dl-body">
            <tr><td colspan="4"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr>
          </tbody>
        </table>
        <div class="insight" id="dl-insight">
          <span class="sk" style="width:80%;height:12px;display:block"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- PRODUCT -->
  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">PRODUCT</span><span class="sec-title">품목별 매출 (구분자 기준)</span></div>
      <div class="sec-line"></div>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th class="L" rowspan="2" style="min-width:190px;vertical-align:bottom">구분자</th>
            <th rowspan="2" style="vertical-align:bottom">총 OTB</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출수량</th>
            <th rowspan="2" style="vertical-align:bottom">총 매출금액</th>
            <th rowspan="2" style="vertical-align:bottom">Sell-thru</th>
            <th colspan="3" class="C bl" style="color:#9B2236;font-weight:600;padding-bottom:4px">채널별 매출 수량 (EA)</th>
          </tr>
          <tr>
            <th class="bl">오프라인</th><th>통합몰</th><th>스마트스토어</th>
          </tr>
        </thead>
        <tbody id="pr-body">
          <tr><td colspan="8"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr>
          <tr><td colspan="8"><span class="sk" style="width:90%;height:26px;display:block;margin-top:3px"></span></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="footer" id="footer-txt">Business Management</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   ★  CSV 주소 — 이 한 줄만 수정
   ──────────────────────────────────────────────────────────────────
   구글 시트 구조 (단일 시트 or 두 시트 자동 감지):

   [단일 시트 — section 컬럼으로 구분]
   section  | 테마 | 88코드 | 구분자 | 오프라인 OTB | 통합몰 OTB | 스마트스토어 OTB | 총 OTB | 날짜 | 판매채널 | 수량 | 금액
   product  | ZNF_ | 880…  | JG_26 | 480          | 480        | 240              | 1200   |      |          |      |
   sales    |      | 880…  |       |              |            |                  |        | 5/15 | 통합몰   | 5    | 214000

   [두 시트 → 첫 번째 탭만 pub URL로 제공 시]
   행에 '날짜' 값이 있으면 매출행, '총 OTB' 값이 있으면 제품행으로 자동 분류
══════════════════════════════════════════════════════════════════ */
const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsYj_rTE_PeKq0VWpe-CtsGaz-MdBZhhJWzEkMD5WFkrawPAuNjbgYCTPRcHGicA/pub?output=csv';

/* ──────────────────────────────────────────────────────────────
   컬럼 별칭 맵
   구글 시트 헤더가 아래 후보 중 어느 것이든 동일하게 처리
────────────────────────────────────────────────────────────── */
const COL = {
  /* 제품 */
  THEME:      ['테마'],
  CODE:       ['88코드', '제품코드', '코드', 'code'],
  NAME:       ['상품명', '제품명', 'name'],
  GUBU:       ['구분자', '구분', 'gubu'],
  OTB_OFF:    ['오프라인 OTB', '오프라인OTB', 'offline_otb'],
  OTB_MALL:   ['통합몰 OTB',   '통합몰OTB',   'mall_otb'],
  OTB_SMT:    ['스마트스토어 OTB', '스마트스토어OTB', '스마트 OTB', 'smart_otb'],
  OTB_ALL:    ['총 OTB', '총  OTB', '총OTB', 'total_otb'],
  /* 매출 */
  DATE:       ['날짜', '일자', '판매일', 'date'],
  CHANNEL:    ['판매채널', '채널', '세부채널', 'channel'],
  QTY:        ['수량', '매출수량', '판매수량', 'qty'],
  SALES:      ['금액', '매출금액', '판매금액', 'sales'],
  /* 섹션 구분 */
  SECTION:    ['section', 'Section', '섹션'],
};

/* 행 r에서 후보 목록 중 첫 번째로 값이 있는 컬럼 값 반환 */
function pick(r, candidates) {
  for (const k of candidates) {
    const v = r[k];
    if (v !== undefined && String(v).trim() !== '') return String(v).trim();
  }
  return '';
}

/* ──────────────────────────────────────────────────────────────
   CSV 파서 (따옴표 안 쉼표 보호)
────────────────────────────────────────────────────────────── */
function parseCSV(raw) {
  const lines = raw.trim().split(/\r?\n/);
  const heads = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const c of line) {
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    cols.push(cur.trim());
    return Object.fromEntries(
      heads.map((h, i) => [h, (cols[i] ?? '').replace(/^"|"$/g, '').trim()])
    );
  }).filter(r => Object.values(r).some(v => v !== ''));
}

/* ──────────────────────────────────────────────────────────────
   행 분류: product / sales / unknown
────────────────────────────────────────────────────────────── */
function classifyRow(r) {
  /* section 컬럼이 있으면 그 값으로 판단 */
  const sec = pick(r, COL.SECTION).toLowerCase();
  if (sec === 'product' || sec === 'prod' || sec === '제품') return 'product';
  if (sec === 'sales'   || sec === 'sale' || sec === '매출') return 'sales';

  /* 없으면 헤더 값으로 자동 감지 */
  const hasOtb  = pick(r, COL.OTB_ALL)  !== '' || pick(r, COL.OTB_OFF)  !== '';
  const hasDate = pick(r, COL.DATE)     !== '';
  const hasQty  = pick(r, COL.QTY)      !== '';
  const hasCode = pick(r, COL.CODE)     !== '';

  if (hasDate && hasQty)        return 'sales';
  if (hasOtb  && !hasDate)      return 'product';
  if (hasCode && !hasDate && !hasQty) return 'product';
  return 'unknown';
}

/* ──────────────────────────────────────────────────────────────
   유틸
────────────────────────────────────────────────────────────── */
const toN  = v => parseFloat(String(v).replace(/,/g, '')) || 0;
const toI  = v => Math.round(toN(v));
const fmtN = v => Number(v).toLocaleString('ko-KR');
const fmtM = w => (!w || w === 0) ? '-' : (w / 1_000_000).toFixed(2) + '백만';
const fmtS = v => v > 0 ? v.toFixed(1) + '%' : '0.0%';

function toMMDD(raw) {
  if (!raw) return '-';
  const s = String(raw).trim();
  if (/^\d{4,5}$/.test(s)) {
    const d = new Date(1899, 11, 30);
    d.setDate(d.getDate() + parseInt(s));
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[2]}/${iso[3]}`;
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})/);
  if (mdy) return `${String(mdy[1]).padStart(2,'0')}/${String(mdy[2]).padStart(2,'0')}`;
  return s.slice(0, 5);
}

function chBucket(ch) {
  const lc = ch.toLowerCase();
  if (lc.includes('오프라인') || lc.includes('offline')) return '오프라인';
  if (lc.includes('통합몰'))                              return '통합몰';
  if (lc.includes('스마트')   || lc.includes('smart'))   return '스마트스토어';
  return '기타';
}

/* ──────────────────────────────────────────────────────────────
   상태 바
────────────────────────────────────────────────────────────── */
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.querySelector('.dot').className = 'dot ' + type;
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

/* ──────────────────────────────────────────────────────────────
   Chart.js
────────────────────────────────────────────────────────────── */
let chartInst = null;
const PAL = ['#1E2029','#555A6E','#8A8FA3','#B0B5C1','#D1D5DB'];

function drawChart(labels, valsMillion) {
  const ctx = document.getElementById('daily-chart').getContext('2d');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: valsMillion,
        backgroundColor: labels.map((_, k) => PAL[Math.min(k, PAL.length-1)]),
        borderRadius: 4, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtM(c.parsed.y * 1_000_000) } }
      },
      scales: {
        x: { grid:{display:false}, border:{display:false},
             ticks:{font:{size:11,family:'"Noto Sans KR",sans-serif'},color:'#8A8FA3',maxRotation:0,autoSkip:false} },
        y: { grid:{color:'#EFEFEF'}, border:{display:false},
             ticks:{font:{size:10},color:'#8A8FA3',callback:v=>v+'백만'} }
      },
      layout: { padding:{ top:30 } }
    },
    plugins: [{
      id:'topLabel',
      afterDatasetsDraw(chart) {
        const {ctx:c,data} = chart;
        chart.getDatasetMeta(0).data.forEach((bar,i) => {
          const v = data.datasets[0].data[i];
          if (!v) return;
          c.save();
          c.font='600 11px "Noto Sans KR",sans-serif';
          c.fillStyle='#1E2029'; c.textAlign='center';
          c.fillText(v.toFixed(2)+'백만', bar.x, bar.y-8);
          c.restore();
        });
      }
    }]
  });
}

/* ──────────────────────────────────────────────────────────────
   렌더 함수들
────────────────────────────────────────────────────────────── */
function renderKPI(totalOtb, totalQty, totalSales) {
  const st = totalOtb > 0 ? totalQty / totalOtb * 100 : 0;
  document.getElementById('v-otb').textContent       = fmtN(totalOtb);
  document.getElementById('v-qty').textContent       = fmtN(totalQty);
  document.getElementById('v-sales').textContent     = fmtM(totalSales);
  document.getElementById('v-sales-raw').textContent = '₩' + fmtN(Math.round(totalSales));
  document.getElementById('v-st').textContent        = fmtS(st);
  document.getElementById('v-st-sub').textContent    = `${fmtN(totalQty)} / ${fmtN(totalOtb)} EA`;
}

function renderChannel(byCh, otbMap) {
  /* byCh: { '오프라인':{qty,sales}, '통합몰':{...}, '스마트스토어':{...} } */
  /* otbMap: { '오프라인': N, '통합몰': N, '스마트스토어': N } */
  const order = ['오프라인','통합몰','스마트스토어'];
  const BADGE = {'오프라인':'b-off','통합몰':'b-mall','스마트스토어':'b-smt'};
  let html = '';

  order.forEach(ch => {
    const d   = byCh[ch]   || { qty:0, sales:0 };
    const otb = otbMap[ch] || 0;
    const st  = otb > 0 ? d.qty / otb * 100 : 0;
    html += `<tr>
      <td class="L"><span class="${BADGE[ch]}">${ch}</span></td>
      <td>${fmtN(otb)}</td>
      <td>${fmtN(d.qty)}</td>
      <td>${fmtM(d.sales)}</td>
      <td>${fmtS(st)}</td>
    </tr>`;
  });

  const onQty   = (byCh['통합몰']?.qty||0)   + (byCh['스마트스토어']?.qty||0);
  const onSales = (byCh['통합몰']?.sales||0) + (byCh['스마트스토어']?.sales||0);
  const onOtb   = (otbMap['통합몰']||0)      + (otbMap['스마트스토어']||0);
  html += `<tr class="row-sub">
    <td class="L">온라인 합계</td>
    <td>${fmtN(onOtb)}</td>
    <td>${fmtN(onQty)}</td>
    <td>${fmtM(onSales)}</td>
    <td>${fmtS(onOtb > 0 ? onQty/onOtb*100 : 0)}</td>
  </tr>`;

  document.getElementById('ch-body').innerHTML = html;
}

function renderDaily(byDate, totalOtb) {
  const sorted = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0]));
  const labels=[], vals=[];
  let totQty=0, totSales=0, html='';

  sorted.forEach(([date,d]) => {
    const st = totalOtb > 0 ? d.qty/totalOtb*100 : 0;
    totQty   += d.qty;
    totSales += d.sales;
    labels.push(date);
    vals.push(d.sales/1_000_000);
    html += `<tr>
      <td class="L">${date}</td>
      <td>${fmtN(d.qty)}</td>
      <td>${fmtM(d.sales)}</td>
      <td>${fmtS(st)}</td>
    </tr>`;
  });
  if (sorted.length > 1) {
    html += `<tr class="row-total">
      <td class="L">합계</td><td>${fmtN(totQty)}</td>
      <td>${fmtM(totSales)}</td><td></td>
    </tr>`;
  }
  document.getElementById('dl-body').innerHTML = html;
  drawChart(labels, vals);

  const box = document.getElementById('dl-insight');
  if (sorted.length && totSales) {
    const peak = sorted.reduce((m,e) => e[1].sales > m[1].sales ? e : m);
    const pct  = (peak[1].sales / totSales * 100).toFixed(0);
    box.innerHTML = `최고 매출일 <strong>${peak[0]}</strong> — ${fmtM(peak[1].sales)} / 전체 대비 ${pct}% 집중`;
  } else {
    box.textContent = '데이터 누적에 따라 자동 업데이트';
  }
}

function renderProducts(prodMap) {
  let html = '';
  Object.values(prodMap).forEach(p => {
    const totQty   = p.qtyOff + p.qtyMall + p.qtySmt;
    const totSales = p.salesOff + p.salesMall + p.salesSmt;
    const st       = p.otbAll > 0 ? totQty/p.otbAll*100 : 0;
    const hi       = st >= 5;
    const dash     = '<span class="dash">—</span>';
    html += `<tr class="${hi?'row-hi':''}">
      <td class="L prod-nm">${p.gubu||p.name||'-'}</td>
      <td>${fmtN(p.otbAll)}</td>
      <td>${fmtN(totQty)}</td>
      <td>${fmtM(totSales)}</td>
      <td class="${hi?'hi-st':''}">${fmtS(st)}</td>
      <td class="bl">${p.qtyOff  > 0 ? fmtN(p.qtyOff)  : dash}</td>
      <td>${p.qtyMall > 0 ? fmtN(p.qtyMall) : dash}</td>
      <td>${p.qtySmt  > 0 ? fmtN(p.qtySmt)  : dash}</td>
    </tr>`;
  });
  document.getElementById('pr-body').innerHTML = html ||
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">제품 데이터 없음</td></tr>';
}

/* ──────────────────────────────────────────────────────────────
   에러 표시
────────────────────────────────────────────────────────────── */
function showErr(msg, detail) {
  setStatus('fail', '데이터 로드 실패');
  document.getElementById('page-title').textContent = '신상품 매출 리포트';
  const html = `<tr><td colspan="8">
    <div class="err-box"><b>${msg}</b>${detail ? `<pre>${detail}</pre>` : ''}</div>
  </td></tr>`;
  ['ch-body','dl-body','pr-body'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
  });
}

/* ══════════════════════════════════════════════════════════════════
   메인
══════════════════════════════════════════════════════════════════ */
async function init() {
  setStatus('spin', '데이터 불러오는 중');

  let raw;
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
    raw = await res.text();
  } catch (e) {
    showErr(
      'CSV를 불러올 수 없습니다. 구글 시트 공유 설정을 확인해주세요.',
      `URL: ${csvUrl}\n오류: ${e.message}\n\n해결 방법:\n구글 시트 → 파일 → 웹에 게시 → "전체 문서" + "CSV" 선택 → 게시`
    );
    return;
  }

  const allRows = parseCSV(raw);
  if (!allRows.length) {
    showErr('CSV 데이터가 비어있습니다', `헤더 행만 있거나 내용이 없습니다.\nURL: ${csvUrl}`);
    return;
  }

  /* ── 행 분류 ── */
  const productRows = allRows.filter(r => classifyRow(r) === 'product');
  const salesRows   = allRows.filter(r => classifyRow(r) === 'sales');

  /* ── 제품 맵 구성 (88코드 기준) ── */
  /* key: 88코드(문자열) → 제품 정보 + 매출 집계 필드 */
  const prodMap = {};
  productRows.forEach(r => {
    const code = pick(r, COL.CODE);
    if (!code) return;
    const otbOff  = toI(pick(r, COL.OTB_OFF));
    const otbMall = toI(pick(r, COL.OTB_MALL));
    const otbSmt  = toI(pick(r, COL.OTB_SMT));
    const otbAll  = toI(pick(r, COL.OTB_ALL)) || (otbOff + otbMall + otbSmt);
    prodMap[code] = {
      theme:  pick(r, COL.THEME),
      name:   pick(r, COL.NAME),
      gubu:   pick(r, COL.GUBU),
      otbOff, otbMall, otbSmt, otbAll,
      qtyOff:0, qtyMall:0, qtySmt:0,
      salesOff:0, salesMall:0, salesSmt:0,
    };
  });

  /* ── 타이틀: 첫 번째 제품의 테마 ── */
  const firstTheme = (Object.values(prodMap)[0] || {}).theme || '';
  const titleEl    = document.getElementById('page-title');
  titleEl.textContent = firstTheme || '신상품 매출 리포트';
  if (firstTheme) {
    document.title = firstTheme + ' — Business Management';
    document.getElementById('footer-txt').textContent = 'Business Management · ' + firstTheme;
  }

  /* ── 매출 집계 ── */
  const byDate = {};            // { 'MM/DD': { qty, sales } }
  const byCh   = {};            // { '오프라인'|'통합몰'|'스마트스토어': { qty, sales } }
  const otbMap = {              // 채널별 OTB 합산
    '오프라인':     Object.values(prodMap).reduce((a,p)=>a+p.otbOff,0),
    '통합몰':       Object.values(prodMap).reduce((a,p)=>a+p.otbMall,0),
    '스마트스토어': Object.values(prodMap).reduce((a,p)=>a+p.otbSmt,0),
  };

  salesRows.forEach(r => {
    const date  = toMMDD(pick(r, COL.DATE));
    const ch    = pick(r, COL.CHANNEL);
    const code  = pick(r, COL.CODE);
    const qty   = toI(pick(r, COL.QTY));
    const sales = toN(pick(r, COL.SALES));
    if (date === '-' || !date) return;

    /* 날짜별 */
    if (!byDate[date]) byDate[date] = { qty:0, sales:0 };
    byDate[date].qty   += qty;
    byDate[date].sales += sales;

    /* 채널별 */
    const bucket = chBucket(ch);
    if (!byCh[bucket]) byCh[bucket] = { qty:0, sales:0 };
    byCh[bucket].qty   += qty;
    byCh[bucket].sales += sales;

    /* 제품별 (88코드 매칭) */
    if (prodMap[code]) {
      if (bucket === '오프라인')     { prodMap[code].qtyOff   += qty; prodMap[code].salesOff   += sales; }
      else if (bucket === '통합몰')  { prodMap[code].qtyMall  += qty; prodMap[code].salesMall  += sales; }
      else                           { prodMap[code].qtySmt   += qty; prodMap[code].salesSmt   += sales; }
    }
  });

  /* ── 전체 합계 ── */
  const totalOtb   = Object.values(prodMap).reduce((a,p) => a + p.otbAll, 0);
  const totalQty   = Object.values(byDate).reduce((a,d)  => a + d.qty, 0);
  const totalSales = Object.values(byDate).reduce((a,d)  => a + d.sales, 0);

  /* ── 렌더 ── */
  renderKPI(totalOtb, totalQty, totalSales);
  renderChannel(byCh, otbMap);
  renderDaily(byDate, totalOtb);
  renderProducts(prodMap);

  /* 데이터 없을 때 경고 */
  if (!productRows.length && !salesRows.length) {
    showErr(
      'CSV는 로드됐지만 제품/매출 행을 인식하지 못했습니다.',
      `전체 행 수: ${allRows.length}\n첫 번째 행 키: ${Object.keys(allRows[0]).join(', ')}\n\n` +
      `시트에 section 컬럼을 추가하거나, 컬럼명이 아래와 일치하는지 확인해주세요:\n` +
      `제품: 테마, 88코드, 구분자, 총 OTB, 오프라인 OTB, 통합몰 OTB, 스마트스토어 OTB\n` +
      `매출: 날짜, 판매채널, 88코드, 수량, 금액`
    );
    return;
  }

  const now = new Date().toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  setStatus('ok', `마지막 업데이트: ${now} · 제품 ${productRows.length}행 · 매출 ${salesRows.length}행`);
}

init();
</script>

</html>
