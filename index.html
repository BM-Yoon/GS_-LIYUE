<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신상품 매출 리포트 — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR','Apple SD Gothic Neo',-apple-system,sans-serif;
  background:#F9F8F6;color:#1E2029;padding:36px 24px;min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1000px;margin:0 auto}

/* ── HEADER ── */
.page-hd{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid #EFEFEF}
.page-title{font-size:20px;font-weight:700;color:#1E2029;margin-bottom:4px;min-height:28px}
.page-team{font-size:11px;color:#8A8FA3}

/* ── STATUS ── */
#status-bar{font-size:11px;margin-bottom:24px;display:flex;align-items:center;gap:7px;min-height:18px;color:#8A8FA3}
#status-bar.ok{color:#0F6E56}
#status-bar.fail{color:#9B2236}
.dot{width:7px;height:7px;border-radius:50%;background:#D1D5DB;flex-shrink:0}
.dot.ok{background:#0F6E56}
.dot.fail{background:#9B2236}
.dot.spin{background:transparent;border:2px solid #D1D5DB;border-top-color:#1E2029;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
@media(max-width:620px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi-card{background:#fff;border:1px solid #EFEFEF;border-radius:10px;padding:18px 20px}
.kpi-lbl{font-size:11px;color:#8A8FA3;margin-bottom:8px}
.kpi-val{font-size:22px;font-weight:700;color:#1E2029;min-height:32px}
.kpi-val.purple{color:#534AB7}
.kpi-sub{font-size:10px;color:#8A8FA3;margin-top:4px;min-height:14px}

/* ── SECTION ── */
.sec-card{background:#fff;border:1px solid #EFEFEF;border-radius:12px;padding:24px 28px;margin-bottom:18px}
.sec-hd{margin-bottom:18px}
.sec-hd-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-badge{background:#F5E6E9;color:#9B2236;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:.08em;white-space:nowrap}
.sec-title{font-size:14px;font-weight:700;color:#1E2029}
.sec-line{height:.5px;background:#9B2236}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th{font-size:10px;color:#8A8FA3;font-weight:500;text-align:right;padding:5px 10px 7px;border-bottom:1px solid #EFEFEF;white-space:nowrap}
th.L{text-align:left}
th.C{text-align:center}
td{font-size:11.5px;padding:8px 10px;text-align:right;color:#1E2029;border-bottom:.5px solid #EFEFEF}
td.L{text-align:left}
tr:last-child td{border-bottom:none}
.row-sub td{color:#8A8FA3;font-size:11px}
.row-sub td.L{text-align:left}
.row-total td{font-weight:700;border-top:1px solid #EFEFEF;border-bottom:none}
.row-total td.L{text-align:left}
.row-hi{background:#FEF7F7}
.hi{color:#9B2236;font-weight:700}
.nm{font-size:11px;color:#8A8FA3;text-align:left;max-width:210px;white-space:normal;word-break:keep-all;line-height:1.5}
.tbl-scroll{overflow-x:auto}
.tbl-scroll table{min-width:760px}
.bl{border-left:1px solid #EFEFEF !important}
.muted{color:#D1D5DB}

/* ── BADGES ── */
.b-off {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#FAECE7;color:#993C1D}
.b-mall{display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E1F5EE;color:#0F6E56}
.b-smt {display:inline-block;font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;background:#E6F1FB;color:#185FA5}

/* ── DAILY ── */
.daily-wrap{display:flex;gap:28px;align-items:flex-start}
.daily-chart-col{flex:1.6}
.daily-tbl-col{flex:1;padding-top:4px}
@media(max-width:680px){.daily-wrap{flex-direction:column}.daily-chart-col,.daily-tbl-col{flex:none;width:100%}}
.chart-box{position:relative;width:100%;height:220px}

/* ── INSIGHT ── */
.insight{margin-top:16px;padding:10px 14px;border-left:3px solid #9B2236;background:#FDFAF9;font-size:11px;color:#1E2029;line-height:1.8;border-radius:0 6px 6px 0}
.insight strong{color:#9B2236}

/* ── SKELETON ── */
.sk{display:inline-block;border-radius:3px;background:linear-gradient(90deg,#EFEFEF 25%,#F9F8F6 50%,#EFEFEF 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── ERROR ── */
.err-box{padding:14px 18px;border-radius:8px;background:#FFF5F5;border:1px solid #F5C6CB;font-size:12px;color:#9B2236;line-height:1.8}
.err-box pre{margin-top:8px;padding:8px 12px;background:#fff;border-radius:4px;font-size:10px;color:#555;white-space:pre-wrap;word-break:break-all}

/* ── DEBUG PANEL (개발용, 배포 시 display:none) ── */
#debug-panel{margin-bottom:16px;padding:10px 14px;background:#F0F4FF;border:1px solid #C7D2FE;border-radius:8px;font-size:10px;color:#3730A3;line-height:1.7;display:none}

/* ── FOOTER ── */
.footer{margin-top:24px;font-size:10px;color:#C8CBD2;text-align:right}
</style>
</head>
<body>
<div class="wrap">

  <div class="page-hd">
    <div class="page-title" id="page-title">
      <span class="sk" style="width:240px;height:24px;display:inline-block"></span>
    </div>
    <div class="page-team">Business Management</div>
  </div>

  <div id="status-bar"><span class="dot spin"></span><span id="status-msg">데이터 불러오는 중</span></div>

  <!-- 디버그 패널 (헤더 감지 결과 확인용 — 배포 후 display:none) -->
  <div id="debug-panel"></div>

  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-lbl">총 OTB</div>
      <div class="kpi-val" id="v-otb"><span class="sk" style="width:72px;height:26px;display:inline-block"></span></div>
      <div class="kpi-sub">EA</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 수량</div>
      <div class="kpi-val" id="v-qty"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>

    </div>
    <div class="kpi-card">
      <div class="kpi-lbl">총 매출 금액</div>

      <div class="kpi-sub" id="v-sales-raw"><span class="sk" style="width:84px;height:11px;display:inline-block;margin-top:3px"></span></div>

    <div class="kpi-card">
      <div class="kpi-lbl">전체 Sell-thru</div>
      <div class="kpi-val purple" id="v-st"><span class="sk" style="width:56px;height:26px;display:inline-block"></span></div>

  <div class="sec-card">
    <div class="sec-hd">

      <div class="sec-line"></div>

    <table>
      <thead><tr>
        <th class="L">채널</th><th>OTB (EA)</th><th>매출 수량 (EA)</th><th>매출 금액</th><th>Sell-thru</th>

      <tbody id="ch-body">
        <tr><td colspan="5"><span class="sk" style="width:100%;height:30px;display:block"></span></td></tr>

        <tr><td colspan="5"><span class="sk" style="width:94%;height:30px;display:block;margin-top:3px"></span></td></tr>

  </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">DAILY</span><span class="sec-title">날짜별 매출 추이</span></div>

      </div>
      <div class="daily-tbl-col">
        <table>
          <thead><tr>
            <th class="L">날짜</th><th>수량 (EA)</th><th>매출 금액</th><th>누적 Sell-thru</th>

          <tbody id="dl-body"><tr><td colspan="4"><span class="sk" style="width:100%;height:26px;display:block"></span></td></tr></tbody>
        </table>
        <div class="insight" id="dl-insight"><span class="sk" style="width:82%;height:12px;display:block"></span></div>
      </div>

  <div class="sec-card">
    <div class="sec-hd">
      <div class="sec-hd-row"><span class="sec-badge">PRODUCT</span><span class="sec-title">품목별 매출 — 구분자 기준 합계</span></div>

          <tr><td colspan="8"><span class="sk" style="width:90%;height:26px;display:block;margin-top:3px"></span></td></tr>

<!-- PapaParse & Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════════
   ★  URL 설정 — 두 줄만 수정하세요
   ──────────────────────────────────────────────────────────────────
   변환 규칙:
     .../edit?gid=790986969#gid=790986969
     → .../pub?output=csv&gid=790986969

   ⚠ 구글 시트 → 파일 → 웹에 게시 → 전체 문서 + CSV → 게시
     (이 설정이 없으면 GitHub Pages에서 CORS 오류 발생)
══════════════════════════════════════════════════════════════════ */
const URL_PROD = 'https://docs.google.com/spreadsheets/d/1kG0ginEtpH2QZ_YkKzSwrGHq2qHFSZyx/pub?output=csv&gid=790986969';
const URL_SALE = 'https://docs.google.com/spreadsheets/d/1kG0ginEtpH2QZ_YkKzSwrGHq2qHFSZyx/pub?output=csv&gid=1244889971';

/* ──────────────────────────────────────────────────────────────
   헤더 자동 감지 (Fuzzy Header Detection)
   — 시트의 실제 헤더명을 소문자 정규화 후 키워드 매칭
────────────────────────────────────────────────────────────── */
const HEADER_MAP = {
  /* 출시상품데이터 */
  theme:    ['테마','theme','IP','ip','아이피'],
  code:     ['88코드','코드','code','product_code','제품코드','item_code'],
  name:     ['상품명','제품명','name','item'],
  gubu:     ['구분자','gubu','category','분류'],
  otb_off:  ['오프라인 otb','오프라인otb','offline otb','offlineotb','offline_otb'],
  otb_mall: ['통합몰 otb','통합몰otb','mall otb','mallotb','mall_otb','통합몰'],
  otb_smt:  ['스마트스토어 otb','스마트스토어otb','스스 otb','스스otb','smt_otb','스마트otb','smart otb'],
  otb_all:  ['총 otb','총otb','total otb','totalotb','total_otb','총  otb'],
  /* 매출데이터 */
  date:     ['날짜','date','일자','판매일','sales_date'],
  channel:  ['판매채널','채널','channel','세부채널','subchannel'],
  prod_code:['제품코드','88코드','코드','product_code','code','item_code'],
  qty:      ['매출수량','수량','qty','quantity','판매수량','sales_qty'],
  sales:    ['매출금액','금액','sales','amount','판매금액','sales_amount'],
  sub_gubu: ['구분자','gubu','category'],
};

/**
 * rows(PapaParse 결과) 의 실제 헤더와 HEADER_MAP 을 매칭해
 * { 논리키: '실제헤더명' } 딕셔너리를 반환
 */
function detectHeaders(rows) {
  if (!rows.length) return {};
  const actual = Object.keys(rows[0]).map(h => h.trim());
  const result = {};
  for (const [logKey, candidates] of Object.entries(HEADER_MAP)) {
    for (const cand of candidates) {
      const found = actual.find(h => h.toLowerCase().replace(/\s+/g,'') === cand.replace(/\s+/g,''));
      if (found) { result[logKey] = found; break; }
    }
  }
  return result;
}

/** 행에서 논리 키에 해당하는 값을 안전하게 꺼냄 */
function getV(row, hMap, logKey, fallback='') {
  const col = hMap[logKey];
  if (!col) return fallback;
  const v = row[col];
  return (v !== undefined && v !== null) ? String(v).trim() : fallback;
}

/* ──────────────────────────────────────────────────────────────
   유틸
────────────────────────────────────────────────────────────── */
const toN  = v => parseFloat(String(v).replace(/,/g,'')) || 0;
const toI  = v => Math.round(toN(v));
const fmtN = v => Number(v).toLocaleString('ko-KR');
const fmtSt = v => (v > 0 ? v.toFixed(1) : '0.0') + '%';
const fmtM  = w => (!w || w === 0) ? '—' : (w / 1_000_000).toFixed(1) + '백만';
const fmtMR = w => '₩' + fmtN(Math.round(w));

function toMMDD(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  if (/^\d{4,5}$/.test(s)) {
    const d = new Date(1899,11,30); d.setDate(d.getDate()+parseInt(s));
    return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  }
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[2]}/${iso[3]}`;
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})/);
  if (mdy) return `${String(mdy[1]).padStart(2,'0')}/${String(mdy[2]).padStart(2,'0')}`;
  return s.slice(0,5) || null;
}

function toBucket(ch) {
  const s = String(ch||'').toLowerCase();
  if (s.includes('통합몰'))                        return '통합몰';
  if (s.includes('스마트') || s.includes('smart')) return '스마트스토어';
  return '오프라인';
}

/* PapaParse Promise wrapper */
function fetchCSV(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url, {
      download: true,
      header: true,        // 첫 행을 헤더로 자동 인식
      skipEmptyLines: true,
      transformHeader: h => h.trim(),
      complete: res => resolve(res.data),
      error:    err => reject(new Error(err.message || String(err))),
    });
  });
}

/* ──────────────────────────────────────────────────────────────
   상태 바
────────────────────────────────────────────────────────────── */
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.querySelector('.dot').className = 'dot ' + type;
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

/* ──────────────────────────────────────────────────────────────
   Chart.js
────────────────────────────────────────────────────────────── */
let chartInst = null;
const PAL = ['#1E2029','#555A6E','#8A8FA3','#B0B5C1','#D1D5DB'];

function drawChart(labels, salesArr) {
  const ctx = document.getElementById('daily-chart').getContext('2d');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: salesArr,
        backgroundColor: labels.map((_,k)=>PAL[Math.min(k,PAL.length-1)]),
        borderRadius: 4, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => fmtM(c.parsed.y) } }
      },
      scales: {
        x: { grid:{display:false}, border:{display:false},
             ticks:{font:{size:11,family:'"Noto Sans KR",sans-serif'},color:'#8A8FA3',maxRotation:0,autoSkip:false} },
        y: { grid:{color:'#EFEFEF'}, border:{display:false},
             ticks:{font:{size:10},color:'#8A8FA3',callback:v=>(v/1_000_000).toFixed(0)+'백만'} }
      },
      layout: { padding:{top:30} }
    },
    plugins:[{
      id:'topLabel',
      afterDatasetsDraw(chart) {
        const {ctx:c,data} = chart;
        chart.getDatasetMeta(0).data.forEach((bar,i) => {
          const v = data.datasets[0].data[i];
          if (!v) return;
          c.save(); c.font='600 11px "Noto Sans KR",sans-serif';
          c.fillStyle='#1E2029'; c.textAlign='center';
          c.fillText(fmtM(v), bar.x, bar.y-8); c.restore();
        });
      }
    }]
  });
}

/* ──────────────────────────────────────────────────────────────
   렌더 함수
────────────────────────────────────────────────────────────── */
function renderKPI(totOtb, totQty, totSales) {
  const st = totOtb > 0 ? totQty/totOtb*100 : 0;
  document.getElementById('v-otb').textContent       = fmtN(totOtb);
  document.getElementById('v-qty').textContent       = fmtN(totQty);
  document.getElementById('v-sales').textContent     = fmtM(totSales);
  document.getElementById('v-sales-raw').textContent = fmtMR(totSales);
  document.getElementById('v-st').textContent        = fmtSt(st);
  document.getElementById('v-st-sub').textContent    = `${fmtN(totQty)} / ${fmtN(totOtb)} EA`;
}

function renderChannel(byCh, otbMap) {
  const ORDER = ['오프라인','통합몰','스마트스토어'];
  const BADGE = {'오프라인':'b-off','통합몰':'b-mall','스마트스토어':'b-smt'};
  let html = '';
  ORDER.forEach(name => {
    const d   = byCh[name]   || {qty:0,sales:0};
    const otb = otbMap[name] || 0;
    const st  = otb > 0 ? d.qty/otb*100 : 0;
    html += `<tr>
      <td class="L"><span class="${BADGE[name]}">${name}</span></td>
      <td>${otb>0?fmtN(otb):'—'}</td><td>${d.qty>0?fmtN(d.qty):'—'}</td>
      <td>${fmtM(d.sales)}</td><td>${otb>0?fmtSt(st):'—'}</td>
    </tr>`;
  });
  const onQ=(byCh['통합몰']?.qty||0)+(byCh['스마트스토어']?.qty||0);
  const onS=(byCh['통합몰']?.sales||0)+(byCh['스마트스토어']?.sales||0);
  const onO=(otbMap['통합몰']||0)+(otbMap['스마트스토어']||0);
  html+=`<tr class="row-sub">
    <td class="L">온라인 합계</td>
    <td>${onO>0?fmtN(onO):'—'}</td><td>${onQ>0?fmtN(onQ):'—'}</td>
    <td>${fmtM(onS)}</td><td>${onO>0?fmtSt(onQ/onO*100):'—'}</td>
  </tr>`;
  const tO=Object.values(otbMap).reduce((a,v)=>a+v,0);
  const tQ=Object.values(byCh).reduce((a,v)=>a+(v.qty||0),0);
  const tS=Object.values(byCh).reduce((a,v)=>a+(v.sales||0),0);
  html+=`<tr class="row-total">
    <td class="L">전체 합계</td><td>${fmtN(tO)}</td><td>${fmtN(tQ)}</td>
    <td>${fmtM(tS)}</td><td>${fmtSt(tO>0?tQ/tO*100:0)}</td>
  </tr>`;
  document.getElementById('ch-body').innerHTML = html;
}

function renderDaily(byDate, totalOtb) {
  const sorted = Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0]));
  const labels=[],salesArr=[];
  let cumQty=0, html='';
  sorted.forEach(([date,d])=>{
    cumQty+=d.qty; labels.push(date); salesArr.push(d.sales);
    html+=`<tr>
      <td class="L" style="font-size:11px">${date}</td>
      <td style="font-size:11px">${fmtN(d.qty)}</td>
      <td style="font-size:11px">${fmtM(d.sales)}</td>
      <td style="font-size:11px">${fmtSt(totalOtb>0?cumQty/totalOtb*100:0)}</td>
    </tr>`;
  });
  if(sorted.length>1){
    const tQ=sorted.reduce((a,e)=>a+e[1].qty,0);
    const tS=sorted.reduce((a,e)=>a+e[1].sales,0);
    html+=`<tr class="row-total"><td class="L">합계</td><td>${fmtN(tQ)}</td><td>${fmtM(tS)}</td><td></td></tr>`;
  }
  document.getElementById('dl-body').innerHTML = html;
  drawChart(labels, salesArr);
  const box = document.getElementById('dl-insight');
  if(sorted.length){
    const tS=sorted.reduce((a,e)=>a+e[1].sales,0);
    const pk=sorted.reduce((m,e)=>e[1].sales>m[1].sales?e:m);
    const pct=tS>0?(pk[1].sales/tS*100).toFixed(0):0;
    box.innerHTML=`최고 매출일 <strong>${pk[0]}</strong> — ${fmtM(pk[1].sales)} / 전체 대비 ${pct}% 집중`;
  } else {
    box.textContent = '날짜별 데이터를 집계 중입니다';
  }
}

function renderProducts(gubuMap) {
  let html='',tO=0,tQ=0,tS=0;
  const sorted = Object.values(gubuMap).sort((a,b)=>{
    const qa=a.qtyOff+a.qtyMall+a.qtySmt, qb=b.qtyOff+b.qtyMall+b.qtySmt;
    return (b.otb>0?qb/b.otb:0)-(a.otb>0?qa/a.otb:0);
  });
  sorted.forEach(g=>{
    const qty=g.qtyOff+g.qtyMall+g.qtySmt;
    const sales=g.salesOff+g.salesMall+g.salesSmt;
    const st=g.otb>0?qty/g.otb*100:0;
    const hi=st>=30;
    tO+=g.otb; tQ+=qty; tS+=sales;
    const dash='<span class="muted">—</span>';
    html+=`<tr class="${hi?'row-hi':''}">
      <td class="nm">${g.name}</td>
      <td>${fmtN(g.otb)}</td><td>${fmtN(qty)}</td><td>${fmtM(sales)}</td>
      <td class="${hi?'hi':''}">${fmtSt(st)}</td>
      <td class="bl">${g.qtyOff>0?fmtN(g.qtyOff):dash}</td>
      <td>${g.qtyMall>0?fmtN(g.qtyMall):dash}</td>
      <td>${g.qtySmt>0?fmtN(g.qtySmt):dash}</td>
    </tr>`;
  });
  html+=`<tr class="row-total">
    <td class="L">합계</td><td>${fmtN(tO)}</td><td>${fmtN(tQ)}</td>
    <td>${fmtM(tS)}</td><td>${fmtSt(tO>0?tQ/tO*100:0)}</td>
    <td class="bl"></td><td></td><td></td>
  </tr>`;
  document.getElementById('pr-body').innerHTML = html ||
    '<tr><td colspan="8" style="text-align:center;padding:20px;color:#8A8FA3;font-size:11px">제품 데이터 없음</td></tr>';
}

/* ──────────────────────────────────────────────────────────────
   에러 표시
────────────────────────────────────────────────────────────── */
function showErr(msg, detail) {
  setStatus('fail','데이터 로드 실패');
  document.getElementById('page-title').textContent = '신상품 매출 리포트';
  const html=`<tr><td colspan="8"><div class="err-box"><b>${msg}</b>${detail?`<pre>${detail}</pre>`:''}</div></td></tr>`;
  ['ch-body','dl-body','pr-body'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=html;});
}

/* ══════════════════════════════════════════════════════════════════
   메인 — PapaParse로 두 탭 병렬 fetch → 88코드 기준 Merge
══════════════════════════════════════════════════════════════════ */
async function init() {
  setStatus('spin','데이터 불러오는 중');

  /* ── 두 탭 병렬 fetch ── */
  let prodRows, saleRows;
  try {
    [prodRows, saleRows] = await Promise.all([fetchCSV(URL_PROD), fetchCSV(URL_SALE)]);
  } catch(e) {
    showErr(
      'CSV 불러오기 실패',
      `${e.message}\n\n해결:\n구글 시트 → 파일 → 웹에 게시 → "전체 문서" + "CSV" → 게시\n(탭별로 별도 게시가 아닌 "전체 문서" 선택)`
    );
    return;
  }

  /* ── 헤더 자동 감지 ── */
  const pH = detectHeaders(prodRows);
  const sH = detectHeaders(saleRows);

  /* 디버그 패널 출력 (개발 중 확인용) */
  const dbg = document.getElementById('debug-panel');
  if (dbg) {
    dbg.style.display = 'block';
    dbg.innerHTML = `
      <b>출시상품데이터 헤더 감지:</b> ${JSON.stringify(pH)}<br>
      <b>매출데이터 헤더 감지:</b> ${JSON.stringify(sH)}<br>
      <b>제품 행수:</b> ${prodRows.length} &nbsp; <b>매출 행수:</b> ${saleRows.length}
    `;
  }

  if (!prodRows.length) {
    showErr('출시상품데이터가 비어있습니다',
      `감지된 헤더: ${Object.keys(prodRows[0]||{}).join(', ')}`); return;
  }

  /* ── 출시상품데이터 파싱 (88코드 → codeMap / 구분자 → gubuMap) ── */
  let theme = '';
  const codeMap = {};  // 88코드 → { gubu, otbOff, otbMall, otbSmt }
  const gubuMap = {};  // 구분자 → 집계 객체

  prodRows.forEach(r => {
    const code = getV(r, pH, 'code');
    if (!code) return;
    if (!theme) theme = getV(r, pH, 'theme');

    const gubu    = getV(r, pH, 'gubu') || getV(r, pH, 'name');
    const otbOff  = toI(getV(r, pH, 'otb_off'));
    const otbMall = toI(getV(r, pH, 'otb_mall'));
    const otbSmt  = toI(getV(r, pH, 'otb_smt'));
    // 총 OTB 컬럼이 있으면 우선 사용, 없으면 채널 OTB 합산
    const otbRaw  = toI(getV(r, pH, 'otb_all'));
    const otbAll  = otbRaw > 0 ? otbRaw : (otbOff + otbMall + otbSmt);

    codeMap[code] = { gubu, otbOff, otbMall, otbSmt };

    if (!gubuMap[gubu]) {
      gubuMap[gubu] = {
        name: gubu, otb: 0,
        otbOff: 0, otbMall: 0, otbSmt: 0,
        qtyOff: 0, qtyMall: 0, qtySmt: 0,
        salesOff: 0, salesMall: 0, salesSmt: 0,
      };
    }
    gubuMap[gubu].otb     += otbAll;
    gubuMap[gubu].otbOff  += otbOff;
    gubuMap[gubu].otbMall += otbMall;
    gubuMap[gubu].otbSmt  += otbSmt;
  });

  /* 타이틀 (테마 = A2 셀) */
  const titleText = theme || '신상품 매출 리포트';
  document.getElementById('page-title').textContent  = titleText;
  document.title = titleText + ' — Business Management';
  document.getElementById('footer-txt').textContent  = 'Business Management · ' + titleText;

  /* ── 매출데이터 파싱 + 88코드 기준 Merge ── */
  const byDate = {};
  const byCh   = {'오프라인':{qty:0,sales:0},'통합몰':{qty:0,sales:0},'스마트스토어':{qty:0,sales:0}};

  saleRows.forEach(r => {
    const dateRaw = getV(r, sH, 'date');
    const date    = toMMDD(dateRaw);
    if (!date) return;

    const ch    = getV(r, sH, 'channel');
    const code  = getV(r, sH, 'prod_code') || getV(r, sH, 'code');
    const qty   = toI(getV(r, sH, 'qty'));
    const sales = toN(getV(r, sH, 'sales'));

    // 구분자: 매출 시트에 있으면 직접, 없으면 88코드로 제품 시트에서 역참조
    const gubu = getV(r, sH, 'sub_gubu') || codeMap[code]?.gubu || '';

    const bkt = toBucket(ch);

    /* 날짜별 */
    if (!byDate[date]) byDate[date] = {qty:0,sales:0};
    byDate[date].qty   += qty;
    byDate[date].sales += sales;

    /* 채널별 */
    byCh[bkt].qty   += qty;
    byCh[bkt].sales += sales;

    /* 구분자별 (88코드 Merge 결과) */
    if (gubu && gubuMap[gubu]) {
      if (bkt==='오프라인')    {gubuMap[gubu].qtyOff  +=qty; gubuMap[gubu].salesOff  +=sales;}
      else if(bkt==='통합몰')  {gubuMap[gubu].qtyMall +=qty; gubuMap[gubu].salesMall +=sales;}
      else                     {gubuMap[gubu].qtySmt  +=qty; gubuMap[gubu].salesSmt  +=sales;}
    }
  });

  /* OTB 채널별 합산 */
  const otbMap = {
    '오프라인':     prodRows.reduce((a,r)=>a+toI(getV(r,pH,'otb_off')),0),
    '통합몰':       prodRows.reduce((a,r)=>a+toI(getV(r,pH,'otb_mall')),0),
    '스마트스토어': prodRows.reduce((a,r)=>a+toI(getV(r,pH,'otb_smt')),0),
  };

  /* 전체 합계 */
  const totalOtb   = Object.values(otbMap).reduce((a,v)=>a+v,0);
  const totalQty   = Object.values(byDate).reduce((a,d)=>a+d.qty,0);
  const totalSales = Object.values(byDate).reduce((a,d)=>a+d.sales,0);

  /* ── 렌더 ── */
  renderKPI(totalOtb, totalQty, totalSales);
  renderChannel(byCh, otbMap);
  renderDaily(byDate, totalOtb);
  renderProducts(gubuMap);

  const now = new Date().toLocaleString('ko-KR',
    {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  setStatus('ok',
    `마지막 업데이트: ${now} · 제품 ${prodRows.length}행 · 매출 ${saleRows.length}행`);
}

init();
</script>

</html>
